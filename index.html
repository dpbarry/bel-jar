<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BelJar — Beluga Sandbox</title>
<meta name="description" content="BelJar: a browser-based sandbox for the Beluga proof language.">
<link rel="icon" type="image/svg+xml" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Crect width="64" height="64" rx="14" fill="hsl(221,24%25,7%25)"/%3E%3Ctext x="50%25" y="50%25" text-anchor="middle" dominant-baseline="central" font-family="JetBrains Mono, monospace" font-size="40" font-weight="700" fill="hsl(212,100%25,67%25)"%3EB%3C/text%3E%3C/svg%3E'>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <span class="header-title">bel-jar</span>
  <div class="header-actions"></div>
</header>

<div class="workspace">
  <aside class="action-bar">
    <button class="action-btn" onclick="loadTemplate('nd')" title="Natural Deduction template">ND</button>
  </aside>

  <div class="panel editor-panel">
    <div class="panel-header">
      <span>Editor</span>
      <button class="btn btn-primary btn-sm" onclick="loadCode()">Load</button>
    </div>
    <textarea id="editor" spellcheck="false" placeholder="Write Beluga code here…"></textarea>
  </div>

  <div class="panel output-panel">
    <div class="panel-header">
      <span>Output</span>
      <button class="btn btn-sm" onclick="clearOutput()">Clear</button>
    </div>
    <div id="output"># Welcome to BelJar. Type "help" below to see REPL commands.</div>
    <div class="toolbar">
      <input id="command-input" type="text" placeholder="%: command">
      <button class="btn" onclick="runCmd()">Run</button>
    </div>
  </div>
</div>

<script>
  window.onerror = (msg, url, line) => {
    document.getElementById('output').textContent += '\n[JS ERROR] ' + msg + ' (line ' + line + ')';
  };
</script>
<script src="beluga_web.bc.js"></script>
<script src="js/app.js"></script>
</body>
</html>
