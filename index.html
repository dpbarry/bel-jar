<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beluga Sandbox</title>
<link rel="icon" type="image/svg+xml" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Crect width="64" height="64" rx="14" fill="hsl(221,24%25,7%25)"/%3E%3Ctext x="50%25" y="50%25" text-anchor="middle" dominant-baseline="central" font-family="JetBrains Mono, monospace" font-size="40" font-weight="700" fill="hsl(212,100%25,67%25)"%3EB%3C/text%3E%3C/svg%3E'>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: hsl(221, 24%, 7%);
    --surface: hsl(217, 22%, 11%);
    --border: hsl(216, 12%, 21%);
    --accent: hsl(212, 100%, 67%);
    --accent-dim: hsl(216, 84%, 52%);
    --accent-soft: hsl(216, 35%, 45%);
    --text: hsl(210, 16%, 82%);
    --text-muted: hsl(213, 10%, 59%);
    --success: hsl(128, 49%, 49%);
    --error: hsl(3, 93%, 63%);
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  * {
    scrollbar-width: thin;
    scrollbar-color: hsl(217, 22%, 24%) transparent;
  }

  *::-webkit-scrollbar {
    width: 10px;
    height: 10px;
  }

  *::-webkit-scrollbar-track {
    background: none;
  }

  *::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, hsl(217, 91%, 60%), hsl(220, 83%, 53%));
    border-radius: 999px;
    border: 2px solid hsl(221, 39%, 11%);
  }

  *::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, hsl(213, 94%, 68%), hsl(217, 91%, 60%));
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-variant-ligatures: none;
    font-feature-settings: "liga" 0, "calt" 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    height: 32px;
    padding: 0 0.75rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-title {
    font-family: var(--mono);
    font-size: 0.72rem;
    line-height: 1;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    position: relative;
    top: 1px;
    color: var(--accent-soft);
    user-select: none;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .workspace {
    flex: 1;
    display: grid;
    grid-template-columns: 72px 1fr 1fr;
    gap: 0;
    min-height: 0;
    overflow: hidden;
  }

  .action-bar {
    grid-column: 1;
    grid-row: 1;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
    padding: 0.65rem 0.5rem;
  }

  .action-btn {
    width: 52px;
    height: 52px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--bg);
    color: var(--accent-soft);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 1.2rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .action-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-1px);
  }

  .panel {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .panel-header {
    padding: 0.6rem 1rem;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .editor-panel {
    grid-column: 2;
    border-right: 1px solid var(--border);
  }

  .output-panel {
    grid-column: 3;
  }

  #editor {
    flex: 1;
    resize: none;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-variant-ligatures: none;
    font-feature-settings: "liga" 0, "calt" 0;
    font-size: 0.85rem;
    line-height: 1.6;
    padding: 1rem;
    border: none;
    outline: none;
    tab-size: 2;
    width: 100%;
    min-height: 0;
  }

  #output {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    background: var(--bg);
    padding: 1rem;
    font-family: var(--mono);
    font-variant-ligatures: none;
    font-feature-settings: "liga" 0, "calt" 0;
    font-size: 0.8rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text-muted);
  }

  .toolbar {
    padding: 0.75rem 1rem;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .btn {
    font-family: var(--sans);
    font-size: 0.8rem;
    font-weight: 600;
    padding: 0.5rem 1.25rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface);
    color: var(--text);
  }

  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-primary {
    background: var(--accent-dim);
    border-color: var(--accent-dim);
    color: hsl(0, 0%, 100%);
  }

  .btn-primary:hover {
    background: var(--accent);
    border-color: var(--accent);
  }

  #command-input {
    flex: 1;
    font-family: var(--mono);
    font-variant-ligatures: none;
    font-feature-settings: "liga" 0, "calt" 0;
    font-size: 0.8rem;
    padding: 0.5rem 0.75rem;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    outline: none;
  }

  #command-input:focus {
    border-color: var(--accent);
  }

  #command-input::placeholder {
    color: var(--text-muted);
  }

  @media (max-width: 768px) {
    .workspace {
      grid-template-columns: 56px 1fr;
      grid-template-rows: 1fr 1fr;
    }
    .action-bar {
      grid-column: 1;
      grid-row: 1 / span 2;
      padding: 0.55rem 0.3rem;
    }
    .action-btn {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      font-size: 1rem;
    }
    .editor-panel {
      grid-column: 2;
      grid-row: 1;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .output-panel {
      grid-column: 2;
      grid-row: 2;
    }
  }
</style>
</head>
<body>

<header>
  <span class="header-title">beluga sandbox</span>
  <div class="header-actions" aria-hidden="true"></div>
</header>

<div class="workspace">
  <aside class="action-bar">
    <button class="action-btn" onclick="loadDefaultTemplate()" title="Insert Natural Deduction template">ND</button>
  </aside>

  <div class="panel editor-panel">
    <div class="panel-header">
      <span>Editor — input.bel</span>
      <button class="btn btn-primary" onclick="loadCode()" style="padding:0.25rem 0.6rem;font-size:0.7rem;">Load</button>
    </div>
    <textarea id="editor" spellcheck="false"></textarea>
  </div>

  <div class="panel output-panel">
    <div class="panel-header">
      <span>Output</span>
      <button class="btn" onclick="clearOutput()" style="padding:0.25rem 0.6rem;font-size:0.7rem;">Clear</button>
    </div>
    <div id="output"># Welcome to Beluga Sandbox. Enter "help" to see REPL commands.</div>
    <div class="toolbar">
      <input id="command-input" type="text" onkeydown="if(event.key==='Enter')runCmd()">
      <button class="btn" onclick="runCmd()">Run</button>
    </div>
  </div>
</div>

<script>
  window.onerror = function(msg, url, line) {
    document.getElementById('output').textContent += '\n[JS ERROR] ' + msg + ' (line ' + line + ')';
  };
</script>
<script src="beluga_web.bc.js"></script>
<script>
  const output = document.getElementById('output');
  const editor = document.getElementById('editor');
  const cmdInput = document.getElementById('command-input');
  const DEFAULT_CODE = `% Natural Deduction 
% Author: Brigitte Pientka


LF o : type =  % formulas
  | ⊃ : o → o → o
  | ⊤ : o
  | ∧   : o → o → o
  | ∨   : o → o → o
  | ¬ : o → o
;


--prefix ¬ 10.
--infix ∧ 5 right.
--infix ∨ 4 right.
--infix ⊃ 3 right.


% Natural deduction
LF nd : o → type =
  | ⊃I : (nd A → nd B)
	 → nd (A ⊃ B)
	       
  | ⊃E : nd (A ⊃ B) → nd A 			  
	 → nd B	       
	       
  | ∧I : nd A → nd B
	 → nd  (A ∧ B)
	       
  | ∧El : nd (A ∧ B)
	  → nd A

  | ∧Er : nd (A ∧ B)
	  → nd B

  | ∨Il : nd A
	  → nd (A ∨ B)
	       
  | ∨Ir : nd B
	  → nd (A ∨ B)
		    
  | ∨E  :  nd (A ∨ B)
        → (nd A → nd C)
        → (nd B → nd C)        
        → nd C

  | ⊤I : nd ⊤
;

%Examples
rec p0 : [ ⊢ nd (A ∧ B ⊃ A)]  =
[ ⊢ ⊃I (\\u. ∧El u)] ;

rec p1 : [ ⊢ nd ((A ∧ B) ⊃ (B ∧ A))] =
[ ⊢ ⊃I \\u. ∧I   (∧Er u) (∧El u)];`;

  if (typeof Beluga === 'undefined') {
    output.textContent += '\n[FATAL] Beluga module failed to load.';
  }

  function loadDefaultTemplate() {
    editor.value = DEFAULT_CODE;
    editor.focus();
  }

  function appendOutput(text) {
    if (text && text.trim()) {
      output.textContent += '\n' + text;
      output.scrollTop = output.scrollHeight;
    }
  }

  function clearOutput() {
    output.textContent = '';
  }

  function loadCode() {
    const code = editor.value;
    if (!code.trim()) {
      return;
    }
    try {
      const result = Beluga.loadFromString(code);
      appendOutput(result);
    } catch (e) {
      appendOutput('Error: ' + e.message);
    }
  }

  function runCmd() {
    let cmd = cmdInput.value.trim();
    if (!cmd) return;
    if (!cmd.startsWith('%:')) cmd = '%:' + cmd;
    try {
      const result = Beluga.runCommand(cmd);
      appendOutput('# ' + cmd);
      appendOutput(result);
    } catch (e) {
      appendOutput('Error: ' + e.message);
    }
    cmdInput.value = '';
  }

  function resetSession() {
    try {
      const result = Beluga.reset();
      clearOutput();
      appendOutput(result);
    } catch (e) {
      appendOutput('Error: ' + e.message);
    }
  }

  // Tab support in editor
  editor.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = this.selectionStart;
      const end = this.selectionEnd;
      this.value = this.value.substring(0, start) + '  ' + this.value.substring(end);
      this.selectionStart = this.selectionEnd = start + 2;
    }
  });
</script>
</body>
</html>
