<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BelJar</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.png">
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header>
    <div class="header-brand">
      <svg class="header-logo" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 25 65 Q 37.5 50, 50 60 T 75 55 V 80 H 25 Z" fill="currentColor" fill-opacity="0.2" stroke="none" />
        <path d="M 25 72 Q 40 60, 55 68 T 75 62 V 80 H 25 Z" fill="currentColor" fill-opacity="0.15" stroke="none" />
        <path d="M 25 65 Q 37.5 50, 50 60 T 75 55" stroke-width="3" />
        <path d="M 44 20 V 14 C 44 9, 56 9, 56 14 V 20 Z" fill="currentColor" fill-opacity="0.15" />
        <path d="M 25 80 V 45 A 25 25 0 0 1 75 45 V 80" />
        <path d="M 33 45 A 17 17 0 0 1 42 30" stroke-width="4" opacity="0.4" />
        <path d="M 18 80 V 86 C 18 94, 30 96, 50 96 C 70 96, 82 94, 82 86 V 80 Z" fill="currentColor" fill-opacity="0.15" />
        <circle cx="58" cy="44" r="3.5" stroke-width="2.5" />
      </svg>
      <span class="header-title">BelJar</span>
    </div>
    <button id="btn-theme" class="icon-btn theme-toggle" data-tooltip="Toggle theme">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </header>

  <div class="workspace">
    <aside class="sidebar">
      <button id="btn-template-nd" class="icon-btn icon-btn-lg" data-tooltip="Natural Deduction">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/>
        </svg>
      </button>
    </aside>

    <div class="panel editor-panel">
      <div class="panel-header">
        <span class="panel-label">Editor</span>
        <button id="btn-load" class="icon-btn" data-tooltip="Load into Beluga">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="6 3 20 12 6 21 6 3"/>
          </svg>
        </button>
      </div>
      <textarea id="editor" spellcheck="false" placeholder="Write Beluga code here..."></textarea>
    </div>

    <div class="panel output-panel">
      <div class="panel-header">
        <span class="panel-label">Output</span>
        <button id="btn-clear" class="icon-btn" data-tooltip="Clear output">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
          </svg>
        </button>
      </div>
      <div id="output"># Welcome to BelJar. Type "help" below to see REPL commands.</div>
      <div class="repl-bar">
        <div class="repl-input-wrap">
          <span class="repl-prompt">&gt;&gt;</span>
          <input id="command-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>
        <button id="btn-run" class="icon-btn icon-btn-accent" data-tooltip="Run command">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    window.onerror = (msg, url, line) => {
      document.getElementById('output').textContent += '\n[JS ERROR] ' + msg + ' (line ' + line + ')';
    };
  </script>
  <script src="beluga_web.bc.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
